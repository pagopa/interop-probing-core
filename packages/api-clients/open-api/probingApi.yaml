openapi: 3.0.3
info:
  title: "E-Service Monitor Interop API specifications"
  version: 1.0.0
  x-summary: "E-Service Monitor APIs"
  description: >-
    OpenAPI specification for E-Service Monitor's services exposed for the Interop platform
  contact:
    name: API Support
    url: "https://www.example.com/support"
    email: support@example.com
  termsOfService: "https://swagger.io/terms/"
servers:
  - url: "{{baseUrl}}"
    description: Base url of the interoperability exposed probing API
tags:
  - name: EServices
    description: >-
      Operations on EServices registry
  - name: Health
    description: >-
      Verify service status

paths:
  "/status":
    get:
      security: []
      summary: Returns the application status
      description: Returns the application status
      operationId: getStatus
      tags:
        - Health
      responses:
        "200":
          description: The service is up and running
          content:
            application/problem+json:
              schema:
                $ref: "#/components/schemas/Problem"

  "/eservices/{eserviceId}/versions/{versionId}/updateState":
    post:
      security:
        - bearerAuth: []
      summary: Updates the state of an e-service.
      description: >-
        Updates the state of the e-service identified by its id and version id.
      tags:
        - EServices
      operationId: updateEserviceState
      parameters:
        - name: eserviceId
          in: path
          required: true
          description: The e-service name
          schema:
            type: string
            format: uuid
        - name: versionId
          in: path
          required: true
          description: the e-service version
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeEserviceStateRequest"
      responses:
        "204":
          description: >-
            The update has been successfully completed
        "400":
          description: >-
            The provided input data is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: >-
            The e-service hasn't been found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: >-
            A managed error has occured during the request elaboration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "about:blank"
                status: 500
                title: "Internal Server Error"
                detail: "There is a problem processing the request on the server."
                correlationId: "string"
                errors:
                  [
                    {
                      "code": "000-1234",
                      "detail": "The server is currently down for maintenance. Please try again later.",
                    },
                  ]

  "/eservices/{eserviceId}/versions/{versionId}/probing/updateState":
    post:
      security:
        - bearerAuth: []
      summary: Activates or deactivates the probing polling process for an e-service.
      description: >-
        Activates or deactivates the probing polling process for the e-service identified by its id and version id
      tags:
        - EServices
      operationId: updateEserviceProbingState
      parameters:
        - name: eserviceId
          in: path
          required: true
          description: The e-service name
          schema:
            type: string
            format: uuid
        - name: versionId
          in: path
          required: true
          description: the e-service version
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeProbingStateRequest"
      responses:
        "204":
          description: >-
            The update has been successfully completed
        "400":
          description: >-
            The provided input data is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: >-
            The e-service hasn't been found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: >-
            A managed error has occured during the request elaboration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "about:blank"
                status: 500
                title: "Internal Server Error"
                detail: "There is a problem processing the request on the server."
                correlationId: "string"
                errors:
                  [
                    {
                      "code": "000-1234",
                      "detail": "The server is currently down for maintenance. Please try again later.",
                    },
                  ]

  "/eservices/{eserviceId}/versions/{versionId}/updateFrequency":
    post:
      security:
        - bearerAuth: []
      summary: Updates the frequency and the time interval of an e-service's polling process.
      description: >-
        Updates the frequency and the time interval of the polling process for the e-service identified by its id and version id
      tags:
        - EServices
      operationId: updateEserviceFrequency
      parameters:
        - name: eserviceId
          in: path
          required: true
          description: The e-service name
          schema:
            type: string
            format: uuid
        - name: versionId
          in: path
          required: true
          description: the e-service version
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChangeProbingFrequencyRequest"
      responses:
        "204":
          description: >-
            The update has been successfully completed
        "400":
          description: >-
            The provided input data is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: >-
            The e-service hasn't been found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: >-
            A managed error has occured during the request elaboration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "about:blank"
                status: 500
                title: "Internal Server Error"
                detail: "There is a problem processing the request on the server."
                correlationId: "string"
                errors:
                  [
                    {
                      "code": "000-1234",
                      "detail": "The server is currently down for maintenance. Please try again later.",
                    },
                  ]

  "/eservices":
    get:
      summary: Retrieve e-services by filters
      description: Retrieve e-services by filters
      tags:
        - EServices
      operationId: searchEservices
      parameters:
        - name: limit
          in: query
          required: true
          description: the e-service's page limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: true
          description: the page's offset
          schema:
            type: integer
            minimum: 0
        - name: eserviceName
          in: query
          required: false
          description: the e-service's name
          schema:
            type: string
        - name: producerName
          in: query
          required: false
          description: the e-service's producer name
          schema:
            type: string
        - name: versionNumber
          in: query
          required: false
          description: the e-service's version
          schema:
            minimum: 1
            type: integer
        - name: state
          in: query
          required: false
          description: the e-service's state
          schema:
            type: array
            items:
              $ref: "#/components/schemas/EserviceStateFE"
      responses:
        "200":
          description: >-
            The search has been successfully performed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchEserviceResponse"
        "400":
          description: >-
            The provided input data is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: >-
            A managed error has occured during the request elaboration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "about:blank"
                status: 500
                title: "Internal Server Error"
                detail: "There is a problem processing the request on the server."
                correlationId: "string"
                errors:
                  [
                    {
                      "code": "000-1234",
                      "detail": "The server is currently down for maintenance. Please try again later.",
                    },
                  ]

  "/producers":
    get:
      summary: Retrieve e-services producers
      description: Retrieve e-services producers
      tags:
        - EServices
      operationId: getEservicesProducers
      parameters:
        - name: limit
          in: query
          required: true
          description: the e-service's page limit
          schema:
            type: integer
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          required: true
          description: the page's offset
          schema:
            type: integer
            minimum: 0
        - name: producerName
          in: query
          required: false
          description: the e-service's producer name
          schema:
            type: string
      responses:
        "200":
          description: >-
            The search for the list of producers has been performed successfully
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SearchProducerNameResponse"
        "400":
          description: >-
            The provided input data is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: >-
            A managed error has occured during the request elaboration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "about:blank"
                status: 500
                title: "Internal Server Error"
                detail: "There is a problem processing the request on the server."
                correlationId: "string"
                errors:
                  [
                    {
                      "code": "000-1234",
                      "detail": "The server is currently down for maintenance. Please try again later.",
                    },
                  ]

  "/eservices/mainData/{eserviceRecordId}":
    get:
      summary: Retrieve e-service main data
      description: Retrieve e-service main data
      tags:
        - EServices
      operationId: getEserviceMainData
      parameters:
        - name: eserviceRecordId
          in: path
          required: true
          description: the e-service's record id
          schema:
            type: integer
            minimum: 1
            format: int64
      responses:
        "200":
          description: >-
            The main data of the service got successfully retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MainDataEserviceResponse"
        "400":
          description: >-
            The provided input data is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: >-
            The e-service hasn't been found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: >-
            A managed error has occured during the request elaboration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "about:blank"
                status: 500
                title: "Internal Server Error"
                detail: "There is a problem processing the request on the server."
                correlationId: "string"
                errors:
                  [
                    {
                      "code": "000-1234",
                      "detail": "The server is currently down for maintenance. Please try again later.",
                    },
                  ]

  "/eservices/probingData/{eserviceRecordId}":
    get:
      summary: Retrieve e-service probing data
      description: Retrieve e-service probing data
      tags:
        - EServices
      operationId: getEserviceProbingData
      parameters:
        - name: eserviceRecordId
          in: path
          required: true
          description: the e-service's record id
          schema:
            type: integer
            minimum: 1
            format: int64
      responses:
        "200":
          description: >-
            The probing data of the service got successfully retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProbingDataEserviceResponse"
        "400":
          description: >-
            The provided input data is invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "404":
          description: >-
            The e-service hasn't been found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
        "500":
          description: >-
            A managed error has occured during the request elaboration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Problem"
              example:
                type: "about:blank"
                status: 500
                title: "Internal Server Error"
                detail: "There is a problem processing the request on the server."
                correlationId: "string"
                errors:
                  [
                    {
                      "code": "000-1234",
                      "detail": "The server is currently down for maintenance. Please try again later.",
                    },
                  ]

components:
  schemas:
    ChangeProbingStateRequest:
      type: object
      required:
        - probingEnabled
      properties:
        probingEnabled:
          type: boolean

    ChangeEserviceStateRequest:
      type: object
      required:
        - eServiceState
      properties:
        eServiceState:
          $ref: "#/components/schemas/EserviceStateBE"

    ChangeProbingFrequencyRequest:
      type: object
      required:
        - frequency
        - startTime
        - endTime
      properties:
        frequency:
          title: Service verification frequency in minutes
          type: integer
          format: int32
          minimum: 1
        startTime:
          title: Service verification start time
          type: string
          format: time
        endTime:
          title: Service verification end time
          type: string
          format: time

    SearchEserviceContent:
      type: object
      properties:
        eserviceRecordId:
          title: Service record Id
          type: integer
          format: int64
        eserviceName:
          title: Service name
          type: string
        producerName:
          title: Service producer name
          type: string
        responseReceived:
          title: last response date
          type: string
          format: date-time
        state:
          $ref: "#/components/schemas/EserviceStateFE"
        versionNumber:
          title: the e-service's version
          minimum: 1
          type: integer

    SearchEserviceResponse:
      type: object
      properties:
        content:
          title: eservice dto list
          type: array
          items:
            $ref: "#/components/schemas/SearchEserviceContent"
        offset:
          title: page offset
          type: integer
        limit:
          title: page limit
          type: integer
        totalElements:
          title: total elements
          type: integer
          format: int64

    SearchProducerNameResponse:
      type: object
      properties:
        label:
          title: label of producer's name
          type: string
        value:
          title: value of producer's name
          type: string

    MainDataEserviceResponse:
      type: object
      properties:
        eserviceName:
          title: Service name
          type: string
        versionNumber:
          title: the e-service's version
          minimum: 1
          type: integer
        producerName:
          title: Service producer name
          type: string
        pollingFrequency:
          title: the e-service's polling frequency
          type: integer
        versionId:
          description: the e-service version
          type: string
          format: uuid
        eserviceId:
          description: the e-service id
          type: string
          format: uuid

    ProbingDataEserviceResponse:
      type: object
      required:
        - probingEnabled
        - eserviceActive
        - state
      properties:
        probingEnabled:
          title: probing activated
          type: boolean
        state:
          $ref: "#/components/schemas/EserviceStateFE"
        responseReceived:
          title: last response date
          type: string
          format: date-time
        eserviceActive:
          title: eservice active
          type: boolean

    EserviceStateFE:
      type: string
      enum:
        - ONLINE
        - OFFLINE
        - "N_D"

    EserviceStateBE:
      type: string
      enum:
        - ACTIVE
        - INACTIVE

    Problem:
      properties:
        type:
          description: URI reference of type definition
          type: string
        status:
          description: The HTTP status code generated by the origin server for this occurrence of the problem.
          example: 400
          maximum: 600
          minimum: 100
          type: integer
          format: int32
        title:
          description: A short, summary of the problem type. Written in english and readable
          example: Service Unavailable
          maxLength: 64
          pattern: "^[ -~]{0,64}$"
          type: string
        detail:
          description: A human readable explanation of the problem.
          example: Request took too long to complete.
          maxLength: 4096
          pattern: "^.{0,1024}$"
          type: string
        correlationId:
          type: string
          nullable: false
        errors:
          type: array
          minItems: 0
          items:
            $ref: "#/components/schemas/ProblemError"
      additionalProperties: false
      required:
        - type
        - status
        - title

    ProblemError:
      properties:
        code:
          description: Internal code of the error
          example: 123-4567
          minLength: 8
          maxLength: 8
          pattern: "^[0-9]{3}-[0-9]{4}$"
          type: string
        detail:
          description: A human readable explanation specific to this occurrence of the problem.
          example: Parameter not valid
          maxLength: 4096
          pattern: "^.{0,1024}$"
          type: string
      required:
        - code
        - detail

  securitySchemes:
    bearerAuth:
      type: http
      description: "A bearer token in the format of a JWS and conformed to the specifications included in [RFC8725](https://tools.ietf.org/html/RFC8725)."
      scheme: bearer
      bearerFormat: JWT
