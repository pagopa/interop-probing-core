name: "Frontend Build"
on:
  push:
    branches:
      - "develop"
    tags:
      - "*"
    paths:
      - "packages/probing-frontend/**"

jobs:
  build_frontend_release:
    name: Build frontend release
    runs-on: ubuntu-latest
    environment: ${{ github.ref_type == 'branch' && github.ref == 'refs/heads/develop' && 'dev' || github.ref_type == 'tag' && 'prod' }}
    env:
      VITE_AWS_USER_POOL_ID: ${{ vars.VITE_AWS_USER_POOL_ID }}
      VITE_AWS_USER_POOLS_WEB_CLIENT_ID: ${{ vars.VITE_AWS_USER_POOLS_WEB_CLIENT_ID }}
      VITE_AWS_PROJECT_REGION: ${{ vars.VITE_AWS_PROJECT_REGION }}
      VITE_AWS_COGNITO_REGION: ${{ vars.VITE_AWS_COGNITO_REGION }}
      VITE_PAGOPA_CATALOGUE: ${{ vars.VITE_PAGOPA_CATALOGUE }}
      VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
    permissions:
      id-token: write
      contents: write
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4
      
      - name: Set Node.js 20.x
        uses: actions/setup-node@1a4442cacd436585916779262731d5b162bc6ec7 # v3
        with:
          node-version: "20"
          registry-url: 'https://npm.pkg.github.com'
      
      - uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          run_install: true
      
      - name: Install dependencies
        run: |
          pnpm install
      
      - name: Build project
        run: |
          pnpm turbo build --filter probing-frontend
      
      - name: Create package.json in /dist folder
        run: |
          VERSION=$(node -p "require('./packages/probing-frontend/package.json').version")
          cd packages/probing-frontend/dist
          cat > package.json << EOF
          {
            "name": "@pagopa/probing-frontend",
            "repository": {
              "type": "git",
              "url": "https://github.com/pagopa/interop-probing-core.git"
            },
            "version": "$VERSION",
            "description": "Probing frontend static assets",
            "files": ["**/*"],
            "publishConfig": {
              "registry": "https://npm.pkg.github.com",
              "access": "public"
            }
          }
          EOF
      
      - name: Publish package to GitHub Packages
        env:
            NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cd packages/probing-frontend/dist
          pnpm publish --no-git-checks
