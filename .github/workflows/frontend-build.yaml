name: "Frontend Build"
on:
  push:
    branches:
      - "develop"
    paths:
      - "packages/probing-frontend/**"

jobs:
  deploy_dev:
    name: Build frontend release
    runs-on: ubuntu-latest
    env:
      VITE_AWS_USER_POOL_ID: ${{ vars.VITE_AWS_USER_POOL_ID }}
      VITE_AWS_USER_POOLS_WEB_CLIENT_ID: ${{ vars.VITE_AWS_USER_POOLS_WEB_CLIENT_ID }}
      VITE_AWS_PROJECT_REGION: ${{ vars.VITE_AWS_PROJECT_REGION }}
      VITE_AWS_COGNITO_REGION: ${{ vars.VITE_AWS_COGNITO_REGION }}
      VITE_PAGOPA_CATALOGUE: ${{ vars.VITE_PAGOPA_CATALOGUE }}
      VITE_BASE_PATH: ${{ vars.VITE_BASE_PATH }}
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@a5ac7e51b41094c92402da3b24376905380afc29 # v4
      
      - name: Set Node.js 20.x
        uses: actions/setup-node@1a4442cacd436585916779262731d5b162bc6ec7 # v3
        with:
          node-version: "20"
      
      - uses: pnpm/action-setup@v3
        with:
          run_install: true
      
      - name: Install dependencies
        run: |
          pnpm install
      
      - name: Build project
        run: |
          pnpm turbo build --filter probing-frontend
      
      - name: Create archive
        run: |
          cd packages/probing-frontend/dist
          zip -r ../../probing-frontend.zip .
      
      - name: Compute new release version
        uses: cycjimmy/semantic-release-action@v3
        id: compute-new-release-version
        with:
          dry_run: true
          semantic_version: 19.0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.compute-new-release-version.outputs.new_version }}
          name: probing-frontend-${{ steps.compute-new-release-version.outputs.new_version }}
          files: probing-frontend.zip
          draft: false
          prerelease: false
